{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ site_title }}</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="{% static 'app/status.css' %}">
</head>
<body>

<header>
  <h1>◈ {{ site_title }}</h1>
  <div class="header-actions">
    <span id="last-updated"></span>
    <a href="https://github.com/Vic-Nas/statuspage" target="_blank" rel="noopener" class="icon-btn" title="GitHub repo">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
          0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
          -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
          .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
          -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
          .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
          .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
          0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
    </a>
    <a href="/admin/" class="icon-btn" title="Admin">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 2.5a2.5 2.5 0 1 1 .59 1.6L6.1 6.54a2.51 2.51 0 0 1 0 2.92l5.49 2.44A2.5 2.5 0 1 1 10.5 13l-5.49-2.44a2.5 2.5 0 1 1 0-5.12L10.41 3.1A2.5 2.5 0 0 1 11 2.5z"/>
      </svg>
    </a>
    <div class="theme-toggle" title="Toggle light/dark">
      <span class="toggle-label" id="theme-lbl">dark</span>
      <div class="toggle-track" id="theme-track" onclick="toggleTheme()">
        <div class="toggle-thumb"></div>
      </div>
    </div>
  </div>
</header>

<div class="window-control">
  <label>Window:</label>
  <button class="window-btn" data-h="1">1h</button>
  <button class="window-btn active" data-h="24">24h</button>
  <button class="window-btn" data-h="48">48h</button>
  <button class="window-btn" data-h="168">7d</button>
</div>

<div class="domains">
  {% for domain in domains %}
  <div class="domain-card" id="card-{{ domain.id }}">
    <div class="domain-header">
      <span class="status-dot unknown" id="dot-{{ domain.id }}"></span>
      <a href="{{ domain.url }}" target="_blank" rel="noopener" class="domain-name">{{ domain.name }}</a>
      <div class="domain-meta">
        <div class="meta-item">
          <div class="val" id="uptime-{{ domain.id }}">—</div>
          <div class="lbl">Uptime</div>
        </div>
        <div class="meta-item">
          <div class="val" id="ms-{{ domain.id }}">—</div>
          <div class="lbl">Last ms</div>
        </div>
      </div>
    </div>
    <div class="charts">
      <div class="chart-wrap">
        <h3>Up / Down</h3>
        <canvas id="updown-{{ domain.id }}"></canvas>
      </div>
      <div class="chart-wrap">
        <h3>Response Time (ms)</h3>
        <canvas id="rt-{{ domain.id }}"></canvas>
      </div>
    </div>
    <div id="incidents-{{ domain.id }}"></div>
  </div>
  {% endfor %}
</div>

{# Inject Django template variables needed by the static JS #}
<script>
  const DOMAINS          = [{% for d in domains %}{ id: {{ d.id }}, name: "{{ d.name }}" },{% endfor %}];
  const REFRESH_INTERVAL = {{ refresh_interval }};
  let   currentHours     = 24;
</script>
<script src="{% static 'app/status.js' %}"></script>
</body>
</html>
